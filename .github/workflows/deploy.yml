name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BASE_PATH: /${{ github.event.repository.name }}/
      GITHUB_PAGES: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build

      - name: Export static pages
        run: |
          npx --yes wrangler@4.105.0 dev --config .output/server/wrangler.json --ip 127.0.0.1 --port 8788 --local > wrangler.log 2>&1 &
          WRANGLER_PID=$!
          trap 'kill "$WRANGLER_PID"' EXIT

          for attempt in {1..60}; do
            if curl --fail --silent --output /dev/null "http://127.0.0.1:8788${BASE_PATH}"; then
              break
            fi

            if ! kill -0 "$WRANGLER_PID" 2>/dev/null; then
              cat wrangler.log
              exit 1
            fi

            sleep 1
          done

          curl --fail --silent --output /dev/null "http://127.0.0.1:8788${BASE_PATH}"
          bun scripts/export-github-pages.mjs \
            --origin http://127.0.0.1:8788 \
            --base-path "$BASE_PATH" \
            --out .output/public

      - name: Add GitHub Pages fallback
        run: |
          cp .output/public/index.html .output/public/404.html
          touch .output/public/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .output/public
          include-hidden-files: true

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
